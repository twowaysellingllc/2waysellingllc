<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2Wayselling LLC | Admin Dashboard</title>

<link rel="stylesheet" href="admin.css?v=20260712-2">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header class="topbar">

<div>

<p class="eyebrow">
2Wayselling LLC
</p>

<h1>
Reservation Dashboard
</h1>

</div>

<button
id="logout"
class="btn btn-logout">

Logout

</button>

</header>

<main class="container">

<div class="cards">

<div class="card">

<h2 id="totalBookings">0</h2>

<p>Total Reservations</p>

</div>

<div class="card">

<h2 id="paidBookings">0</h2>

<p>Paid</p>

</div>

<div class="card">

<h2 id="pendingBookings">0</h2>

<p>Pending Payment</p>

</div>

<div class="card">

<h2 id="confirmedBookings">0</h2>

<p>Confirmed</p>

</div>

</div>

<section class="panel">

<div class="toolbar">

<div>

<h2>Reservations</h2>

<p id="dashboardMessage"></p>

</div>

<input

id="search"

type="search"

placeholder="Search reservation..."

>

</div>

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>Reservation ID</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>Vehicle</th>

<th>Pickup</th>

<th>Return</th>

<th>Pickup Date</th>

<th>Return Date</th>

<th>Payment</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="tableBody">

<tr>

<td colspan="12">

Loading reservations...

</td>

</tr>

</tbody>

</table>

</div>

</section>

</main>

<!-- Reservation Details Popup -->

<div

id="reservationModal"

class="modal"

hidden

>

<div

class="modal-backdrop"

data-close-modal

></div>

<div class="modal-card">

<button

class="modal-close"

data-close-modal

>

×

</button>

<h2>

Reservation Details

</h2>

<div

id="modalContent"

class="modal-content"

>

</div>

</div>

</div>

<script src="admin.js?v=20260712-2"></script>

</body>

</html>
