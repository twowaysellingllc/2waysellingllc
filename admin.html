<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2WaySelling Admin Dashboard</title>

<link rel="stylesheet" href="admin.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

    <header>

        <h1>2WaySelling Admin Dashboard</h1>

        <button id="logout">
            Logout
        </button>

    </header>


    <div class="cards">

        <div class="card">

            <h2 id="totalBookings">0</h2>

            <p>Total Reservations</p>

        </div>

        <div class="card">

            <h2 id="paidBookings">0</h2>

            <p>Paid</p>

        </div>

        <div class="card">

            <h2 id="pendingBookings">0</h2>

            <p>Pending Payment</p>

        </div>

        <div class="card">

            <h2 id="confirmedBookings">0</h2>

            <p>Confirmed</p>

        </div>

    </div>


    <input
        id="search"
        placeholder="Search reservation..."
    >


    <div class="table-wrapper">

<table>

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>Vehicle</th>

<th>Pickup</th>

<th>Return</th>

<th>Pickup Date</th>

<th>Return Date</th>

<th>Payment</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script src="admin.js"></script>

</body>

</html>
